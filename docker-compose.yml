version: '3.8'

services:
  web:
    build: .
    command: gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    environment:
      - DB_NAME=tienda_db
      - DB_USER=postgres
      - DB_PASSWORD=secret_password
      - DB_HOST=db
      - DB_PORT=5432

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web